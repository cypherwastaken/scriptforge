<title>MicroLauncher - AnuraOS</title>
<script>
  function createContainer() {
  if (!parent.anura.wm || !parent.anura.wm.create) {
    setTimeout(createContainer, 50);
    return;
  }

  const win = parent.anura.wm.createGeneric({
    title: "FrickGarett [MLauncher Injector]",
    width: 800,
    height: 600
  });

  async function insertIframe() {
    if (!win.content) {
      setTimeout(insertIframe, 50);
      return;
    }

    const iframe = document.createElement("iframe");
    iframe.src = "https://frickgarett.vercel.app";
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";

    win.content.innerHTML = "";
    win.content.appendChild(iframe);

    if (parent.anura.notifications) {
      parent.anura.notifications.add({
        title: "Micro Launcher",
        description: "Container should have started"
      });
    }
  }

  insertIframe();
}

var confirmvar = parent.anura.dialog.confirm("Click OK to launch\nDevice: " + anura.platform.type, "Micro Launcher")
if (confirmvar) {
	createContainer();
}
</script>
<p>MicroLauncher should start in your container</p>
