<title>MicroLauncher - AnuraOS</title>

<script>

function waitForAnura(callback) {

  if (parent.anura && parent.anura.wm) {
    callback();
  } else {
    setTimeout(() => waitForAnura(callback), 50);
  }

}

function createContainer() {

  const win = parent.anura.wm.createGeneric({
    title: "FrickGarett [MLauncher Injector]",
    width: 800,
    height: 600
  });

  function insertIframe() {

    if (!win.content) {
      setTimeout(insertIframe, 50);
      return;
    }

    const iframe = document.createElement("iframe");

    iframe.src = "https://frickgarett.vercel.app";
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";

    win.content.innerHTML = "";
    win.content.appendChild(iframe);

    if (parent.anura.notifications) {

      parent.anura.notifications.add({
        title: "Micro Launcher",
        description: "Container started successfully"
      });

    }

  }

  insertIframe();

}

waitForAnura(() => {

  const device = parent.anura?.platform?.type || "Unknown";

  const confirmvar = parent.anura.dialog.confirm(
    "Click OK to launch\nDevice: " + device,
    "Micro Launcher"
  );

  if (confirmvar) {
    createContainer();
  }

});

</script>

<p>MicroLauncher should start in your container</p>
