<title>MicroLauncher - AnuraOS</title>
<script>
  function createContainer() {
  if (!anura.wm || !anura.wm.create) {
    setTimeout(createContainer, 50);
    return;
  }

  const win = anura.wm.createGeneric({
    title: "MicroLauncher",
    width: 800,
    height: 600
  });

  async function insertIframe() {
    if (!win.content) {
      setTimeout(insertIframe, 50);
      return;
    }

    let microurl = await anura.dialog.prompt("ML (include https)");

    const iframe = document.createElement("iframe");
    iframe.src = microurl;
    iframe.style.width = "100%";
    iframe.style.height = "100%";
    iframe.style.border = "none";

    win.content.innerHTML = "";
    win.content.appendChild(iframe);

    if (anura.notifications) {
      anura.notifications.add({
        title: "Micro Launcher",
        description: "Container should have started"
      });
    }
  }

  insertIframe();
}

var confirmvar = await anura.dialog.confirm("Click OK to launch\nDevice: " + anura.platform.type, "Micro Launcher")
if (confirmvar) {
	createContainer();
}
</script>
<p>MicroLauncher should start in your container</p>
